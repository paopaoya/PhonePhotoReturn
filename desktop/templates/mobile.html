<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>拍照上传</title>
  <style>
    :root {
      color-scheme: light;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
    }
    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      background: #f4f6f8;
      color: #172033;
    }
    main {
      width: min(92vw, 440px);
      padding: 22px;
      background: #fff;
      border: 1px solid #d9dee7;
      border-radius: 8px;
      box-shadow: 0 8px 26px rgba(23, 32, 51, .08);
      text-align: center;
    }
    h1 {
      margin: 0 0 16px;
      font-size: 24px;
      letter-spacing: 0;
    }
    .actions {
      display: grid;
      gap: 10px;
    }
    label,
    button {
      display: block;
      width: 100%;
      box-sizing: border-box;
      padding: 14px 16px;
      border: 0;
      border-radius: 8px;
      background: #1967d2;
      color: #fff;
      font-size: 17px;
      font-weight: 600;
    }
    button.secondary,
    label.secondary {
      background: #334155;
    }
    button:disabled {
      background: #9aa7b8;
    }
    input[type="file"] {
      display: none;
    }
    #status {
      min-height: 24px;
      margin: 16px 0 0;
      color: #5b6575;
    }
    #preview {
      display: none;
      width: 100%;
      margin-top: 14px;
      border-radius: 8px;
      border: 1px solid #d9dee7;
    }
  </style>
</head>
<body>
  <main>
    <h1>拍照回传电脑</h1>
    <div class="actions">
      <label for="camera">拍照上传</label>
      <input id="camera" name="photo" type="file" accept="image/*" capture="environment">
      <label class="secondary" for="gallery">从相册选择</label>
      <input id="gallery" name="photo" type="file" accept="image/*" multiple>
    </div>
    <p id="status">准备就绪</p>
    <img id="preview" alt="照片预览">
  </main>

  <script>
    const token = "{{ token }}";
    const camera = document.getElementById("camera");
    const gallery = document.getElementById("gallery");
    const status = document.getElementById("status");
    const preview = document.getElementById("preview");
    let uploading = false;

    camera.addEventListener("change", async () => {
      const file = camera.files[0];
      if (!file) return;
      await uploadFiles([file]);
    });

    gallery.addEventListener("change", async () => {
      const files = Array.from(gallery.files || []);
      if (!files.length) return;
      await uploadFiles(files);
    });

    function setInputsDisabled(disabled) {
      camera.disabled = disabled;
      gallery.disabled = disabled;
    }

    async function uploadFiles(orderedFiles) {
      if (uploading) return;
      uploading = true;
      setInputsDisabled(true);

      try {
        for (let i = 0; i < orderedFiles.length; i++) {
          const file = orderedFiles[i];
          preview.src = URL.createObjectURL(file);
          preview.style.display = "block";
          status.textContent = `正在上传 ${i + 1} / ${orderedFiles.length}: ${file.name}`;
          await uploadOne(file);
        }
        status.textContent = `上传完成：${orderedFiles.length} 张`;
      } catch (error) {
        status.textContent = `上传失败：${error.message}`;
      } finally {
        uploading = false;
        gallery.value = "";
        camera.value = "";
        setInputsDisabled(false);
      }
    }

    async function uploadOne(file) {
      const form = new FormData();
      form.append("token", token);
      form.append("photo", file);

      const response = await fetch(`/upload?token=${encodeURIComponent(token)}`, {
        method: "POST",
        body: form
      });
      if (!response.ok) throw new Error(`HTTP ${response.status}`);
    }
  </script>
</body>
</html>
