name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  desktop:
    name: Build Windows desktop
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: pip
          cache-dependency-path: desktop/requirements.txt

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r desktop/requirements.txt

      - name: Build executable
        shell: pwsh
        run: .\desktop\build.ps1

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: PhonePhotoReturn-desktop
          path: |
            outputs/PhonePhotoReturn.exe
            outputs/PhonePhotoReturn-source.zip
          if-no-files-found: error

  android:
    name: Build Android app
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Build debug APK
        working-directory: android
        run: gradle assembleDebug

      - name: Collect Android artifacts
        shell: bash
        run: |
          mkdir -p outputs
          cp android/app/build/outputs/apk/debug/app-debug.apk outputs/PhonePhotoReturn-Android-debug.apk
          (
            cd android
            zip -r ../outputs/PhonePhotoReturn-Android-source.zip \
              settings.gradle \
              build.gradle \
              gradle.properties \
              README.md \
              build.ps1 \
              app/build.gradle \
              app/libs \
              app/src
          )

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: PhonePhotoReturn-android
          path: |
            outputs/PhonePhotoReturn-Android-debug.apk
            outputs/PhonePhotoReturn-Android-source.zip
          if-no-files-found: error

  release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs:
      - desktop
      - android

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Write release notes
        shell: bash
        run: |
          cat > release-notes.md <<'EOF'
          更新内容：
          - 电脑端合并微信/App 扫码入口，并增加扫码地址复制按钮。
          - 电脑端启动窗口居中显示，使用自定义图标。
          - 上传照片文件名改为微秒时间戳 + UUID，并用独占创建避免覆盖。
          - 服务端口被占用时会在界面提示启动失败，并禁用二维码。
          - 本机地址改为优先读取 Windows 本地网卡 IPv4。
          - Android 端使用自定义图标，保留 CameraX 拍照与方向修正。
          EOF

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            release-assets/PhonePhotoReturn.exe \
            release-assets/PhonePhotoReturn-source.zip \
            release-assets/PhonePhotoReturn-Android-debug.apk \
            release-assets/PhonePhotoReturn-Android-source.zip \
            --repo "${GITHUB_REPOSITORY}" \
            --title "PhonePhotoReturn ${GITHUB_REF_NAME}" \
            --notes-file release-notes.md
