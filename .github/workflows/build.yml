name: Build

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  desktop:
    name: Build Windows desktop
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: pip
          cache-dependency-path: desktop/requirements.txt

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r desktop/requirements.txt

      - name: Build executable
        shell: pwsh
        run: .\desktop\build.ps1

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: PhonePhotoReturn-desktop
          path: |
            outputs/PhonePhotoReturn.exe
            outputs/PhonePhotoReturn-source.zip
          if-no-files-found: error

  android:
    name: Build Android app
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Build debug APK
        working-directory: android
        run: gradle assembleDebug

      - name: Collect Android artifacts
        shell: bash
        run: |
          mkdir -p outputs
          cp android/app/build/outputs/apk/debug/app-debug.apk outputs/PhonePhotoReturn-Android-debug.apk
          (
            cd android
            zip -r ../outputs/PhonePhotoReturn-Android-source.zip \
              settings.gradle \
              build.gradle \
              gradle.properties \
              README.md \
              build.ps1 \
              app/build.gradle \
              app/libs \
              app/src
          )

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: PhonePhotoReturn-android
          path: |
            outputs/PhonePhotoReturn-Android-debug.apk
            outputs/PhonePhotoReturn-Android-source.zip
          if-no-files-found: error
